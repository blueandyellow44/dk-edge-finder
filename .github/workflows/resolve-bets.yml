name: Resolve Bets

on:
  schedule:
    # 10 PM Pacific = 5 AM UTC (next day) during PDT, 6 AM UTC during PST
    - cron: '0 5 * * *'
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: write

# Serialize with place-bets and scan workflows so data.json writes don't race.
concurrency:
  group: dk-data-write
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync KV placements to data.json
        working-directory: scripts
        env:
          # Cloudflare API token with Workers KV Storage:Read on the
          # EDGE_STATE namespace + Account ID. When unset, the script
          # logs and skips so the cron keeps running. Set both as
          # repo secrets to enable the going-forward bridge.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python sync_kv_placements.py

      - name: Resolve pending bets
        working-directory: scripts
        run: python resolve_bets.py

      - name: Generate AI daily summaries
        working-directory: scripts
        env:
          # Optional: when unset, the script logs and skips so the cron
          # keeps running. Set ANTHROPIC_API_KEY as a repo secret in
          # GitHub Actions Settings to enable Anthropic-backed daily
          # commentary on the Activity tab. Idempotent: only generates
          # summaries for dates not already in daily_summaries.json.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_daily_summary.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DK Edge Bot"
          git config user.email "max.sheahan@icloud.com"
          git add data.json bankroll.json pick_history.json daily_summaries.json
          git commit -m "Auto-resolve: $(date +%Y-%m-%d) bet results"
          git push
          # Sync to Cloudflare deploy branch. The Cloudflare bot occasionally
          # pushes "Add Cloudflare Workers configuration" commits to this branch
          # (sometimes with content, sometimes empty). Fetch + merge them into
          # main before re-syncing, so we never lose bot content and never leave
          # cloudflare/workers-autoconfig behind main.
          git fetch origin cloudflare/workers-autoconfig || true
          if git show-ref --verify --quiet refs/remotes/origin/cloudflare/workers-autoconfig; then
            git merge --no-edit origin/cloudflare/workers-autoconfig || true
            git push origin main || true
          fi
          git push origin main:cloudflare/workers-autoconfig || true
