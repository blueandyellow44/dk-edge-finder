name: Full Scan (Games + Props)

on:
  schedule:
    # 6 AM PT (1 PM UTC during PDT) — one full scan per day
    # Props + games ready when Max wakes up. European soccer covered (games start ~4 AM PT).
    # Uses Odds API credits (~24 credits per run)
    - cron: '0 13 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve yesterday's bets
        working-directory: scripts
        run: python resolve_bets.py

      - name: Run full edge scan (games + props)
        working-directory: scripts
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scan_edges.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DK Edge Bot"
          git config user.email "max.sheahan@icloud.com"
          git add data.json bankroll.json pick_history.json
          git commit -m "Full scan: $(date +%Y-%m-%d_%H%M) — games + props"
          git push
          # Sync to Cloudflare deploy branch
          git fetch origin cloudflare/workers-autoconfig || true
          git push origin main:cloudflare/workers-autoconfig || true
