name: Place Bets

on:
  # Manual trigger from GitHub UI (fallback / debug)
  workflow_dispatch:
    inputs:
      picks:
        description: 'Comma-separated pick indices to mark as placed (e.g. "0,1,2" or "all")'
        required: true
        type: string

  # Triggered by the site via Cloudflare Worker -> GitHub API
  # Payload: { picks: "all" | "0,1,2", triggered_at: ISO8601, source: "worker" }
  repository_dispatch:
    types: [place-bets]

permissions:
  contents: write

# Serialize with scan/resolve workflows so concurrent writes to data.json
# don't race. All data-writing workflows share this group.
concurrency:
  group: dk-data-write
  cancel-in-progress: false

jobs:
  place:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve picks input
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            PICKS='${{ github.event.client_payload.picks }}'
            SOURCE='${{ github.event.client_payload.source }}'
          else
            PICKS='${{ github.event.inputs.picks }}'
            SOURCE='workflow_dispatch'
          fi
          echo "picks=$PICKS" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "Received picks=$PICKS from source=$SOURCE"

      - name: Mark bets as placed
        run: python scripts/place_bets.py "${{ steps.resolve.outputs.picks }}"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DK Edge Bot"
          git config user.email "max.sheahan@icloud.com"
          git add data.json bankroll.json
          git commit -m "Bets placed: $(date +%Y-%m-%d) (${{ steps.resolve.outputs.source }})"
          git pull --rebase origin main
          git push origin main

          # Sync to Cloudflare deploy branch (fetch+merge bot commits first, never force-push)
          git fetch origin cloudflare/workers-autoconfig || true
          if git show-ref --verify --quiet refs/remotes/origin/cloudflare/workers-autoconfig; then
            git merge --no-edit origin/cloudflare/workers-autoconfig || true
            git push origin main || true
          fi
          git push origin main:cloudflare/workers-autoconfig || true
