name: Game Scan (No Props)

on:
  schedule:
    # Every 3 hours during game-relevant window (PT times shown for PDT):
    # 9 AM PT (4 PM UTC), 12 PM PT (7 PM UTC), 6 PM PT (1 AM UTC), 9 PM PT (4 AM UTC)
    # Skips 6 AM and 3 PM PT since full-scan.yml covers those
    # FREE — uses DRatings/Dimers/ESPN only, zero Odds API credits
    - cron: '0 4,16,19,1 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run game-only edge scan (no API credits)
        working-directory: scripts
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scan_edges.py --games-only

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DK Edge Bot"
          git config user.email "max.sheahan@icloud.com"
          git add data.json bankroll.json
          git commit -m "Game scan: $(date +%Y-%m-%d_%H%M) — games only (no props)"
          git push
