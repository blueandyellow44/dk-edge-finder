name: Game Scan (No Props)

on:
  schedule:
    # Every 3 hours during game-relevant window (PT times shown for PDT):
    # 9 AM PT (4 PM UTC), 12 PM PT (7 PM UTC), 6 PM PT (1 AM UTC), 9 PM PT (4 AM UTC)
    # Skips 6 AM and 3 PM PT since full-scan.yml covers those
    # FREE — uses DRatings/Dimers/ESPN only, zero Odds API credits
    - cron: '0 4,16,19,1 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

# Serialize with place-bets and resolve-bets so data.json writes don't race.
concurrency:
  group: dk-data-write
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve pending bets
        working-directory: scripts
        run: python resolve_bets.py

      - name: Run game-only edge scan (no API credits)
        working-directory: scripts
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scan_edges.py --games-only

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DK Edge Bot"
          git config user.email "max.sheahan@icloud.com"
          git add data.json bankroll.json pick_history.json
          git commit -m "Game scan: $(date +%Y-%m-%d_%H%M) — games only (no props)"
          git push
          # Sync to Cloudflare deploy branch. The Cloudflare bot occasionally
          # pushes "Add Cloudflare Workers configuration" commits to this branch
          # (sometimes with content, sometimes empty). Fetch + merge them into
          # main before re-syncing, so we never lose bot content and never leave
          # cloudflare/workers-autoconfig behind main.
          git fetch origin cloudflare/workers-autoconfig || true
          if git show-ref --verify --quiet refs/remotes/origin/cloudflare/workers-autoconfig; then
            git merge --no-edit origin/cloudflare/workers-autoconfig || true
            git push origin main || true
          fi
          git push origin main:cloudflare/workers-autoconfig || true
